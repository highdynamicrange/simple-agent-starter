name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest
